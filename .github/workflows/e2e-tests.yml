name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      eor-ref:
        description: 'endless-org-roam git ref to test'
        default: 'prototype'
        type: string

jobs:
  e2e-vanilla:
    name: "Vanilla Emacs ${{ matrix.emacs-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['29.4', '30.1', 'snapshot']
    steps:
      - name: Checkout test env
        uses: actions/checkout@v4

      - name: Checkout endless-org-roam
        uses: actions/checkout@v4
        with:
          repository: cuttlefisch/endless-org-roam
          ref: ${{ inputs.eor-ref || 'prototype' }}
          path: endless-org-roam

      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Prepare fixtures
        run: |
          WORK_DIR=$(mktemp -d)
          cp -r fixtures/instance-a "$WORK_DIR/"
          cp -r fixtures/instance-b "$WORK_DIR/"
          echo "EOR_WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"

      - name: Run E2E tests (vanilla)
        env:
          EOR_PACKAGE_DIR: ${{ github.workspace }}/endless-org-roam
          EOR_EMACS_DIR: ${{ runner.temp }}/eor-straight
        run: |
          # Use the vanilla profile's init.el to bootstrap straight.el
          # and install org-roam, then run the E2E test suite
          emacs --batch \
            -l profiles/vanilla/init.el \
            -l tests/test-e2e-common.el \
            -f eor-e2e-run-all

  e2e-doom:
    name: "Doom Emacs ${{ matrix.emacs-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - name: Checkout test env
        uses: actions/checkout@v4

      - name: Checkout endless-org-roam
        uses: actions/checkout@v4
        with:
          repository: cuttlefisch/endless-org-roam
          ref: ${{ inputs.eor-ref || 'prototype' }}
          path: endless-org-roam

      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Setup Cask
        uses: conao3/setup-cask@master

      - name: Install dependencies
        working-directory: endless-org-roam
        run: cask install

      - name: Prepare fixtures
        run: |
          WORK_DIR=$(mktemp -d)
          cp -r fixtures/instance-a "$WORK_DIR/"
          cp -r fixtures/instance-b "$WORK_DIR/"
          echo "EOR_WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"

      - name: Run E2E tests (doom)
        env:
          EOR_PACKAGE_DIR: ${{ github.workspace }}/endless-org-roam
        working-directory: endless-org-roam
        run: |
          cask exec emacs --batch \
            -l ../tests/test-e2e-common.el \
            -f eor-e2e-run-all

  e2e-spacemacs:
    name: "Spacemacs Emacs ${{ matrix.emacs-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - name: Checkout test env
        uses: actions/checkout@v4

      - name: Checkout endless-org-roam
        uses: actions/checkout@v4
        with:
          repository: cuttlefisch/endless-org-roam
          ref: ${{ inputs.eor-ref || 'prototype' }}
          path: endless-org-roam

      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install Spacemacs
        run: |
          git clone --depth 1 https://github.com/syl20bnr/spacemacs ~/.emacs.d
          cp profiles/spacemacs/.spacemacs ~/.spacemacs
          # Bootstrap Spacemacs packages
          emacs --batch -l ~/.emacs.d/init.el --kill 2>&1 || true

      - name: Prepare fixtures
        run: |
          WORK_DIR=$(mktemp -d)
          cp -r fixtures/instance-a "$WORK_DIR/"
          cp -r fixtures/instance-b "$WORK_DIR/"
          echo "EOR_WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"

      - name: Run E2E tests (spacemacs)
        env:
          EOR_PACKAGE_DIR: ${{ github.workspace }}/endless-org-roam
        run: |
          emacs --batch \
            -l ~/.emacs.d/init.el \
            -L "$EOR_PACKAGE_DIR" \
            -l tests/test-e2e-common.el \
            -f eor-e2e-run-all

  # Weekly test against org-roam HEAD to catch upstream breakage
  org-roam-compat:
    name: "org-roam HEAD compatibility"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout test env
        uses: actions/checkout@v4

      - name: Checkout endless-org-roam
        uses: actions/checkout@v4
        with:
          repository: cuttlefisch/endless-org-roam
          ref: ${{ inputs.eor-ref || 'prototype' }}
          path: endless-org-roam

      - name: Checkout org-roam HEAD
        uses: actions/checkout@v4
        with:
          repository: org-roam/org-roam
          path: org-roam-head

      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '30.1'

      - name: Setup Cask
        uses: conao3/setup-cask@master

      - name: Run unit tests against org-roam HEAD
        working-directory: endless-org-roam
        run: |
          cask install
          make test
